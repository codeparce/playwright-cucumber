workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"' 
      when: always

    - when: never

stages:
  - BUILD & REPORTS


BUILD-REPORT:
  image: node:20
  stage: BUILD & REPORTS
  before_script: 
    - echo "antes de los scripts"
    - apt-get update && apt-get install -y jq >> info.log
  script:
    - bash ./api_vault.sh
    - bash ./install_depend.sh
  after_script:
    - cat try_error.log
  artifacts:
    when: always 
    paths:
      - output
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

